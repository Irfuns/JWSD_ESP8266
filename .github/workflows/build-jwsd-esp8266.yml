name: Build JWSD ESP8266 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # ===============================
    # 1. Checkout source
    # ===============================
    - name: Checkout source
      uses: actions/checkout@v4

    # ===============================
    # 2. Setup Arduino CLI
    # ===============================
    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    # ===============================
    # 3. Install ESP8266 Core
    # ===============================
    - name: Install ESP8266 Core
      run: |
        arduino-cli core update-index
        arduino-cli core install esp8266:esp8266

    # ===============================
    # 4. Install Libraries (OFFICIAL)
    # ===============================
    - name: Install Libraries
      run: |
        arduino-cli lib install "ArduinoJson"
        arduino-cli lib install "RTClib"
        arduino-cli lib install "PrayerTimes"
        arduino-cli lib install "NTPClient"

    # ===============================
    # 5. Install DMDESP (MANUAL)
    # ===============================
    - name: Install DMDESP manually
      run: |
        mkdir -p $HOME/Arduino/libraries
        git clone https://github.com/freetronics/DMDESP.git $HOME/Arduino/libraries/DMDESP

    # ===============================
    # 6. Compile Firmware
    # ===============================
    - name: Compile JWSD Firmware
      run: |
        arduino-cli compile \
          --fqbn esp8266:esp8266:generic \
          --build-property build.flash_size=4M \
          --build-property upload.maximum_size=1044464 \
          --output-dir build \
          JWSD-ESP8266

    # ===============================
    # 7. Upload BIN
    # ===============================
    - name: Upload Firmware BIN
      uses: actions/upload-artifact@v4
      with:
        name: JWSD-ESP8266-BIN
        path: build/*.bin
