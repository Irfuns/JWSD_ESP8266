name: Build JWSD ESP8266 Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v1

    - name: Install ESP8266 Core
      run: |
        arduino-cli core update-index \
          --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

        arduino-cli core install esp8266:esp8266 \
          --additional-urls http://arduino.esp8266.com/stable/package_esp8266com_index.json

    - name: Install Libraries
      run: |
        arduino-cli lib install "ArduinoJson"
        arduino-cli lib install "RTClib"
        arduino-cli lib install "PrayerTimes"
        arduino-cli lib install "DMDESP"
        arduino-cli lib install "NTPClient"

    - name: Compile JWSD ESP8266
      run: |
        arduino-cli compile \
          --fqbn esp8266:esp8266:generic \
          --build-property flash_size=4M \
          --build-property lwip_variant=v2_low_memory \
          --output-dir build \
          .

    - name: Upload BIN
      uses: actions/upload-artifact@v4
      with:
        name: JWSD-ESP8266-BIN
        path: build/**/*.bin
